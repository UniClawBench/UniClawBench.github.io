name: Deploy UniClawBench static WebUI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout static site
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate static bundle
        run: |
          test -f index.html
          test -f 404.html
          test -f runs.json
          test -f results.json
          test -d static
          test -d attempts
          test -d task-details
          touch .nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
