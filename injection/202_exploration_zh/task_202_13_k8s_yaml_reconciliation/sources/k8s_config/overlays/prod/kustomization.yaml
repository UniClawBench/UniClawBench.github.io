apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shop
resources:
  - ../../base
  - hpa.yaml
patchesStrategicMerge:
  - patch.yaml
images:
  # image transformer ALSO sets a tag — conflicts with the explicit
  # image: line in patch.yaml above. Kustomize image transformer wins.
  - name: registry.example.com/orders
    newTag: "1.6.0"
